services:
  - type: web
    name: hrms-backend
    env: python
    plan: free
    buildCommand: |
      pip uninstall -y pydantic fastapi sqlalchemy
      pip install -r requirements.txt --no-cache-dir
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
