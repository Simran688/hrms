services:
  - type: web
    name: hrms-backend
    env: python
    plan: free
    pythonVersion: 3.11.0
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
      python migrate.py
      pip list | grep uvicorn
    startCommand: |
      cd backend
      python migrate.py
      python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
